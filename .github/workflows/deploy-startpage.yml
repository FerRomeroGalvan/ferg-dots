name: Deploy Startpage

on:
  push:
    branches: [main]
    paths:
      - 'startpage/**'
      - '.github/workflows/deploy-startpage.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject token and build
        run: |
          mkdir -p docs
          sed 's/__GH_TOKEN__/${{ secrets.STARTPAGE_GH_TOKEN }}/g' \
            startpage/index.html > docs/index.html
          echo "Token injected, docs/index.html ready"

      - name: Commit and push docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "ci: deploy startpage [skip ci]"
          git push
