name: Deploy Startpage

on:
  push:
    branches: [main]
    paths:
      - 'startpage/**'
      - '.github/workflows/deploy-startpage.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject tokens
        run: |
          mkdir -p _site
          sed -e 's/__GH_TOKEN__/${{ secrets.STARTPAGE_GH_TOKEN }}/g' \
              -e 's/__GH_TOKEN_DWR__/${{ secrets.STARTPAGE_GH_TOKEN_DWR }}/g' \
              startpage/index.html > _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
