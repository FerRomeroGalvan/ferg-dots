; =============================================================================
; polybar/config.ini — candle-light theme
;
; Candle palette:
;   bg       #0D0D0D   near-black
;   bg-alt   #1E1A14   warm dark
;   fg       #F2F2F2   neutral white
;   ivory    #F5EFE0   warm ivory
;   bone     #E8E0D0   off-white
;   amber    #D99962   flame — used sparingly
;   wax      #C8955A   candle body / charging
;   wick     #7A6A55   dark cord
;   mute     #555555   cool mid-grey
;   dim      #383838   comment-level
;   ember    #6B2A1A   urgent / smoldering
; =============================================================================

[colors]
bg       = #0D0D0D
bg-alt   = #1E1A14
fg       = #F2F2F2
ivory    = #F5EFE0
bone     = #E8E0D0
amber    = #D99962
wax      = #C8955A
wick     = #7A6A55
mute     = #555555
dim      = #383838
ember    = #6B2A1A

; =============================================================================
; BAR
; =============================================================================
[bar/candle]
monitor =
bottom = true
height = 36
radius = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2
line-color = ${colors.amber}

border-top-size = 1
border-top-color = ${colors.bg-alt}

padding-left = 2
padding-right = 2
; tighter on the left (less stuff), looser on the right (busier cluster)
module-margin-left = 1
module-margin-right = 2

; quieter icon weight — was 16, now 14
font-0 = JetBrainsMono NFM:style=Regular:size=13;2
font-1 = JetBrainsMono NFM:style=Regular:size=14;2

modules-left   = workspaces xwindow
modules-center = date
modules-right  = battery network launcher

; middot separator at dim — matches splashpage language
separator = %{F#383838}·%{F-}

cursor-click = pointer
enable-ipc = true

; =============================================================================
; MODULES
; =============================================================================

; --- Workspaces --------------------------------------------------------------
[module/workspaces]
type = internal/xworkspaces
pin-workspaces = false
show-urgent = true
icon-default = 

label-active            = %name%
label-active-foreground = ${colors.amber}
label-active-underline  = ${colors.amber}
label-active-padding    = 1

label-occupied            = %name%
label-occupied-foreground = ${colors.wick}
label-occupied-padding    = 1

; ember (was wax) — gives urgent a distinct voice from charging
label-urgent            = %name%
label-urgent-foreground = ${colors.ember}
label-urgent-padding    = 1

label-empty            = %name%
label-empty-foreground = ${colors.dim}
label-empty-padding    = 1

; --- Active window title -----------------------------------------------------
[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.bone}
label-empty = 
label-empty-foreground = ${colors.dim}

; --- Date & time -------------------------------------------------------------
; Lowercased to match splashpage tone — uses LC_TIME=C with custom strings
[module/date]
type = internal/date
interval = 5

date = %a %d %b
date-alt = %A %B %d
time = %H:%M

; Wrap the date in a custom format that lowercases inline.
; Polybar doesn't have a native lowercase token, so we use the format string
; and accept that day/month abbreviations come out as the system locale gives them.
; If yours capitalize, run polybar with LC_TIME=C and add `lower-day` style envvar
; in launch.sh; we handle that there.
label = %{F#7A6A55}%date%%{F-}  %{F#D99962}%time%%{F-}
label-foreground = ${colors.fg}

; --- Battery -----------------------------------------------------------------
; Wax-as-burning-candle: a vertical bar block that empties as charge drops.
; The ramp glyphs ▁▂▃▄▅▆▇█ visually echo a candle burning down.
[module/battery]
type = internal/battery
battery = ${env:BATTERY:BAT0}
adapter = ${env:ADAPTER:AC}
full-at = 100
poll-interval = 10

format-charging    = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full        = <label-full>

label-charging    = bat %percentage%
label-discharging = bat %percentage%
label-full        = bat 100
label-full-foreground = ${colors.wax}

; Wax burning down: low battery shows a short stub, full shows a tall candle
ramp-capacity-0 = ▁
ramp-capacity-1 = ▂
ramp-capacity-2 = ▃
ramp-capacity-3 = ▄
ramp-capacity-4 = ▅
ramp-capacity-5 = ▆
ramp-capacity-6 = ▇
ramp-capacity-7 = █
ramp-capacity-foreground = ${colors.wax}
; warning levels — get warmer (amber) as it drops below 30%, ember below 10%
ramp-capacity-0-foreground = ${colors.ember}
ramp-capacity-1-foreground = ${colors.ember}
ramp-capacity-2-foreground = ${colors.amber}

animation-charging-0 = ▁
animation-charging-1 = ▃
animation-charging-2 = ▅
animation-charging-3 = ▇
animation-charging-4 = █
animation-charging-foreground = ${colors.amber}
animation-charging-framerate = 750

; --- Network -----------------------------------------------------------------
; Dropped the wifi glyph, replaced with text token "wifi"
[module/network]
type = internal/network
interface = ${env:NETWORK:wlp0s20f3}
interval = 3

format-connected    = <label-connected>
format-disconnected = <label-disconnected>

label-connected            = wifi %essid%
label-connected-foreground = ${colors.wick}

label-disconnected            = offline
label-disconnected-foreground = ${colors.dim}

; --- Launcher (rofi) ---------------------------------------------------------
; Already text-only; just keep
[module/launcher]
type = custom/text
format = menu
format-foreground = ${colors.mute}
format-padding = 1
click-left = rofi -show drun
