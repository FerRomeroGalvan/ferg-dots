; =============================================================================
; polybar/config.ini — candle-light theme
;
; Candle palette:
;   bg       #0D0D0D   near-black
;   bg-alt   #1E1A14   warm dark (CursorLine)
;   fg       #F2F2F2   neutral white
;   ivory    #F5EFE0   warm ivory
;   bone     #E8E0D0   off-white
;   amber    #D99962   flame — used sparingly
;   wax      #C8955A   candle body
;   wick     #7A6A55   dark cord
;   shadow   #555555   cool mid-grey
;   dim      #383838   comment-level
; =============================================================================

[colors]
bg       = #0D0D0D
bg-alt   = #1E1A14
fg       = #F2F2F2
ivory    = #F5EFE0
bone     = #E8E0D0
amber    = #D99962
wax      = #C8955A
wick     = #7A6A55
shadow   = #555555
dim      = #383838

; =============================================================================
; BAR
; =============================================================================
[bar/candle]
monitor =
bottom = true
height = 28
radius = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2
line-color = ${colors.amber}

border-top-size = 1
border-top-color = ${colors.bg-alt}

padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 1

font-0 = JetBrainsMono NFM:style=Regular:size=10;2
font-1 = JetBrainsMono NFM:style=Regular:size=14;3

modules-left   = workspaces xwindow
modules-center = date
modules-right  = battery network launcher

separator = %{F#383838}│%{F-}
separator-margin = 1

cursor-click = pointer
enable-ipc = true

; =============================================================================
; MODULES
; =============================================================================

; --- Workspaces --------------------------------------------------------------
[module/workspaces]
type = internal/xworkspaces
pin-workspaces = false
show-urgent = true
icon-default = 

label-active            = %name%
label-active-foreground = ${colors.amber}
label-active-underline  = ${colors.amber}
label-active-padding    = 1

label-occupied            = %name%
label-occupied-foreground = ${colors.wick}
label-occupied-padding    = 1

label-urgent            = %name%
label-urgent-foreground = ${colors.wax}
label-urgent-padding    = 1

label-empty            = %name%
label-empty-foreground = ${colors.dim}
label-empty-padding    = 1

; --- Active window title ------------------------------------------------------
[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.bone}
label-empty = 
label-empty-foreground = ${colors.dim}

; --- Date & time -------------------------------------------------------------
[module/date]
type = internal/date
interval = 5

date = %a %d %b
time = %H:%M

label = %{F#7A6A55}%date%%{F-}  %{F#D99962}%time%%{F-}
label-foreground = ${colors.fg}

; --- Battery -----------------------------------------------------------------
[module/battery]
type = internal/battery
battery = ${env:BATTERY:BAT0}
adapter = ${env:ADAPTER:AC}
full-at = 100
poll-interval = 10

format-charging    = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full        = <label-full>

label-charging    = %percentage%%%
label-discharging = %percentage%%%
label-full        = 100 
label-full-foreground = ${colors.wax}

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.wax}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.amber}
animation-charging-framerate = 750

; --- Network -----------------------------------------------------------------
[module/network]
type = internal/network
interface = ${env:NETWORK:wlp0s20f3}
interval = 3

format-connected    = <label-connected>
format-disconnected = <label-disconnected>

label-connected            =  %essid%
label-connected-foreground = ${colors.wick}

label-disconnected            =  offline
label-disconnected-foreground = ${colors.dim}

; --- Launcher (rofi) ---------------------------------------------------------
[module/launcher]
type = custom/text
format = menu 
format-foreground = ${colors.shadow}
format-padding = 1
click-left = rofi -show drun
