# =============================================================================
# starship.toml — candle-light theme
# Palette mirrors the vim candle-light color system:
#   amber  #D99962  flame — the live fire, used sparingly
#   bone   #E8E0D0  off-white — names and titles
#   wax    #C8955A  muted terracotta — keywords, git branch
#   wick   #7A6A55  dark cord — arrows, separators
#   shadow #555555  cool mid-grey — punctuation, info
#   dim    #383838  comment-level — timestamps, low priority
# =============================================================================

format = """
$directory$git_branch$git_status$python$cmd_duration
$character"""

# --- Directory ---------------------------------------------------------------
[directory]
style = "bold #E8E0D0"          # bone — the path is a name
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "#C8955A"

# --- Git branch --------------------------------------------------------------
[git_branch]
format = "[ $branch]($style) "
style = "#C8955A"               # wax — prepared, structured
symbol = " "

# --- Git status --------------------------------------------------------------
[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "#D99962"               # amber — live change, the flame
modified = "▎"
staged = "▎"
untracked = "▏"
deleted = "▋"
conflicted = "▊"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

# --- Python venv / version ---------------------------------------------------
[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "#7A6A55"               # wick — supporting, dim
symbol = " "
detect_files = ["*.py", "pyproject.toml", "requirements.txt", ".python-version"]

# --- Command duration --------------------------------------------------------
[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "#383838"               # dim — low priority info

# --- Prompt character --------------------------------------------------------
[character]
success_symbol = "[❯](#555555)"     # shadow — recedes when all is well
error_symbol = "[❯](#CC3333)"       # ember red — something burned

# --- Disabled modules (keep prompt lean) -------------------------------------
[package]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true
